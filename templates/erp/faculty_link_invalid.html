<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Invalid Link — Jain University</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f0f3fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .box {
      background: #fff;
      padding: 48px 40px;
      border-radius: 16px;
      max-width: 460px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.1);
    }

    .icon {
      font-size: 60px;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: #0a2558;
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .note {
      background: #fef3e2;
      border: 1px solid #f2a900;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12.5px;
      color: #8a4800;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="icon">🔗</div>
    <h1>Invalid or Expired Link</h1>
    <p>This faculty submission link is no longer valid. The HOD may have deleted the form or generated a new link.</p>
    <div class="note">Please contact your HOD to get the correct submission link.</div>
  </div>
  <script src="/static/erp/loading.js"></script>
</body>

</html>
